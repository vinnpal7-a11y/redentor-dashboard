name: Actualizar estadísticas — cada lunes

on:
  schedule:
    - cron: '0 16 * * 1'   # Lunes 10am CST (16:00 UTC)
  workflow_dispatch:        # También se puede correr manualmente

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Obtener stats y actualizar index.html
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_PAGE_TOKEN:   ${{ secrets.META_PAGE_TOKEN }}
          META_PAGE_ID:      "532062283670945"
          META_IG_ACCOUNT:   "17841456697845516"
          YT_CHANNEL_ID:     "UCP5sDBKbgBZnBiwvw_ZC9RA"
          YT_API_KEY:        ${{ secrets.YT_API_KEY }}
        run: |
          python3 - << 'EOF'
          import os, json, re, requests
          from datetime import datetime, timezone

          USER_TOKEN = os.environ['META_ACCESS_TOKEN']
          PAGE_TOKEN = os.environ['META_PAGE_TOKEN']
          PAGE_ID    = os.environ['META_PAGE_ID']
          IG_ACCT    = os.environ['META_IG_ACCOUNT']
          YT_CH      = os.environ['YT_CHANNEL_ID']
          YT_KEY     = os.environ.get('YT_API_KEY','')

          # ── Leer baseline de la semana anterior desde el index.html actual ──
          with open('index.html') as f:
              old_html = f.read()
          old_m = re.search(r'<script id="stats-data" type="application/json">(.*?)</script>', old_html, re.DOTALL)
          prev_week = {}
          if old_m:
              try:
                  old_stats = json.loads(old_m.group(1))
                  yt_old = old_stats.get('youtube', {})
                  ig_old = old_stats.get('instagram', {})
                  fb_old = old_stats.get('facebook', {})
                  prev_week = {
                      'yt_subs':      yt_old.get('subscribers', 0),
                      'ig_followers': ig_old.get('followers', 0),
                      'fb_fans':      fb_old.get('fans', 0),
                  }
                  print(f"Baseline anterior: {prev_week}")
              except Exception as e:
                  print(f"Baseline error: {e}")

          stats = {'fetched_at': datetime.now(timezone.utc).isoformat(), 'prev_week': prev_week}

          # ── Instagram ──
          try:
              ig = requests.get(
                  f'https://graph.facebook.com/v19.0/{IG_ACCT}',
                  params={'fields':'followers_count,media_count','access_token':USER_TOKEN},
                  timeout=10
              ).json()
              posts_r = requests.get(
                  f'https://graph.facebook.com/v19.0/{IG_ACCT}/media',
                  params={'fields':'id,media_type,timestamp,like_count,comments_count','limit':5,'access_token':USER_TOKEN},
                  timeout=10
              ).json()
              posts = posts_r.get('data',[])
              ig_followers = ig.get('followers_count',0)
              stats['instagram'] = {
                  'followers':       ig_followers,
                  'media_count':     ig.get('media_count',0),
                  'recent_likes':    sum(p.get('like_count',0) for p in posts),
                  'recent_comments': sum(p.get('comments_count',0) for p in posts),
                  'posts':           posts,
                  'followers_delta': ig_followers - prev_week.get('ig_followers', ig_followers),
              }
              print(f"IG: {ig.get('followers_count')} seguidores")
          except Exception as e:
              print(f"IG error: {e}")
              stats['instagram'] = {}

          # ── Facebook ──
          try:
              fb = requests.get(
                  f'https://graph.facebook.com/v19.0/{PAGE_ID}',
                  params={'fields':'fan_count,followers_count','access_token':PAGE_TOKEN},
                  timeout=10
              ).json()
              fb_fans = fb.get('fan_count',0)
              stats['facebook'] = {
                  'fans':       fb_fans,
                  'followers':  fb.get('followers_count',0),
                  'fans_delta': fb_fans - prev_week.get('fb_fans', fb_fans),
              }
              print(f"FB: {fb.get('fan_count')} fans")
          except Exception as e:
              print(f"FB error: {e}")
              stats['facebook'] = {}

          # ── YouTube (API Key para datos públicos) ──
          try:
              if YT_KEY:
                  ch = requests.get(
                      'https://www.googleapis.com/youtube/v3/channels',
                      params={'part':'statistics','id':YT_CH,'key':YT_KEY},
                      timeout=10
                  ).json()
                  yt_st = ch['items'][0]['statistics']
                  subs  = int(yt_st.get('subscriberCount',0))
                  views = int(yt_st.get('viewCount',0))

                  # Shorts recientes (IDs hardcodeados — se actualizan con el pipeline semanal)
                  short_ids = ['VmVWoWqHbEA','d7Be9nfBANU','WYEFrEBaGVY','v8c5AD0C7jc','-NOYisLSkT4','v_LCM4q6I30']
                  sv = requests.get(
                      'https://www.googleapis.com/youtube/v3/videos',
                      params={'part':'statistics,snippet','id':','.join(short_ids),'key':YT_KEY},
                      timeout=10
                  ).json()
                  shorts = [{'id':i['id'],
                             'title':i['snippet']['title'].replace(' #Shorts',''),
                             'views':int(i['statistics'].get('viewCount',0)),
                             'likes':int(i['statistics'].get('likeCount',0))}
                            for i in sv.get('items',[])]
                  stats['youtube'] = {
                      'subscribers':       subs,
                      'total_views':       views,
                      'shorts':            shorts,
                      'shorts_total_views':sum(s['views'] for s in shorts),
                      'shorts_total_likes':sum(s['likes'] for s in shorts),
                      'subs_delta':        subs - prev_week.get('yt_subs', subs),
                  }
                  print(f"YT: {subs} subs (API key)")
              else:
                  print("YT: sin API key — manteniendo datos anteriores")
                  # Leer stats actuales y mantener YT
                  with open('index.html') as f:
                      existing = f.read()
                  m = re.search(r'<script id="stats-data" type="application/json">(.*?)</script>', existing, re.DOTALL)
                  if m:
                      old = json.loads(m.group(1))
                      stats['youtube'] = old.get('youtube', {})
          except Exception as e:
              print(f"YT error: {e}")
              stats['youtube'] = {}

          # ── Inyectar en index.html ──
          with open('index.html') as f:
              html = f.read()

          # Actualizar stats-data
          new_tag = f'<script id="stats-data" type="application/json">{json.dumps(stats, ensure_ascii=False)}</script>'
          html = re.sub(
              r'<script id="stats-data" type="application/json">.*?</script>',
              new_tag, html, flags=re.DOTALL
          )

          # Actualizar history-data — añadir entrada de la semana anterior
          hist_m = re.search(r'<script id="history-data" type="application/json">(.*?)</script>', html, re.DOTALL)
          if hist_m and prev_week:
              history = json.loads(hist_m.group(1))
              from datetime import datetime as dt2, timedelta
              # Lunes de la semana anterior
              today = dt2.now(timezone.utc)
              last_mon = today - timedelta(days=today.weekday()+7)
              week_key = last_mon.strftime('%Y-%m-%d')
              yt_now  = stats.get('youtube',{}).get('subscribers',0)
              ig_now  = stats.get('instagram',{}).get('followers',0)
              fb_now  = stats.get('facebook',{}).get('fans',0)
              new_entry = {
                  'week':        week_key,
                  'ig_followers':ig_now - prev_week.get('ig_followers',ig_now),
                  'fb_fans':     fb_now - prev_week.get('fb_fans',fb_now),
                  'yt_subs':     yt_now - prev_week.get('yt_subs',yt_now),
                  'reel_views':  stats.get('youtube',{}).get('shorts_total_views',0),
                  'ig_total':    ig_now,
                  'fb_total':    fb_now,
                  'yt_total':    yt_now,
              }
              if not any(h['week']==week_key for h in history):
                  history.append(new_entry)
                  history.sort(key=lambda h: h['week'])
                  new_hist = f'<script id="history-data" type="application/json">{json.dumps(history, ensure_ascii=False)}</script>'
                  html = re.sub(
                      r'<script id="history-data" type="application/json">.*?</script>',
                      new_hist, html, flags=re.DOTALL
                  )
                  print(f"✅ history-data: entrada {week_key} añadida — {new_entry}")
              else:
                  print(f"ℹ️  history-data: semana {week_key} ya existe")

          with open('index.html', 'w') as f:
              f.write(html)
          print(f"✅ index.html actualizado — {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}")
          EOF

      - name: Commit y push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Sin cambios en stats."
          else
            git commit -m "Stats actualizados $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
