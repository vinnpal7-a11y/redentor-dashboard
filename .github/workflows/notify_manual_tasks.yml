name: Recordatorios semanales — tareas manuales

on:
  schedule:
    # Todos los horarios en UTC (Chihuahua = UTC-6)
    - cron: '0 15 * * 1'    # Lunes    9:00 AM CST  → Story lunes
    - cron: '30 18 * * 3'   # Miércoles 12:30 PM CST → Story miércoles
    - cron: '0 19 * * 4'    # Jueves   1:00 PM CST  → Carrusel predicación
    - cron: '0 16 * * 6'    # Sábado   10:00 AM CST → Carrusel versículos
    - cron: '30 14 * * 0'   # Domingo  8:30 AM CST  → Story domingo
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Preparar mensaje según el día
        id: msg
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" = "1" ]; then
            echo "subject=📱 Redentor — Subir Story de hoy (Lunes 9am)" >> $GITHUB_OUTPUT
            echo "body=Hola! Toca subir la Story bíblica en Instagram. Archivo: story_lunes.jpg en iCloud > REDENTOR REDES > stories_semana_2_junio_2026. Los Reels de hoy ya salieron automáticos en IG, FB y YouTube. Dashboard: https://vinnpal7-a11y.github.io/redentor-dashboard/" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "3" ]; then
            echo "subject=📱 Redentor — Story teaser antes del Reel (Miércoles 12:30pm)" >> $GITHUB_OUTPUT
            echo "body=Hola! Toca subir la Story teaser antes del Reel de hoy. Archivo: story_miercoles.jpg en iCloud > REDENTOR REDES > stories_semana_2_junio_2026. El Reel sale automático a la 1pm CST. Dashboard: https://vinnpal7-a11y.github.io/redentor-dashboard/" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "4" ]; then
            echo "subject=🖼️ Redentor — Publicar Carrusel de Predicación (Jueves 1pm)" >> $GITHUB_OUTPUT
            echo "body=Hola! Toca publicar el Carrusel de Predicación en Instagram. Carpeta: carrusel_predica/ (5 slides) en iCloud > REDENTOR REDES > carruseles_semana_2_junio_2026. Abre IG > + > Publicacion > selecciona los 5 slides en orden. Dashboard: https://vinnpal7-a11y.github.io/redentor-dashboard/" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "6" ]; then
            echo "subject=🖼️ Redentor — Publicar Carrusel de Versículos (Sábado 10am)" >> $GITHUB_OUTPUT
            echo "body=Hola! Toca publicar el Carrusel de Versiculos en Instagram. Carpeta: carrusel_versiculos/ (6 slides) en iCloud > REDENTOR REDES > carruseles_semana_2_junio_2026. Dashboard: https://vinnpal7-a11y.github.io/redentor-dashboard/" >> $GITHUB_OUTPUT
          else
            echo "subject=📱 Redentor — Story invitación al servicio (Domingo 8:30am)" >> $GITHUB_OUTPUT
            echo "body=Hola! Toca subir la Story de invitacion al servicio dominical. Archivo: story_domingo.jpg en iCloud > REDENTOR REDES > stories_semana_2_junio_2026. Que el servicio de hoy sea una bendicion! Dashboard: https://vinnpal7-a11y.github.io/redentor-dashboard/" >> $GITHUB_OUTPUT
          fi

      - name: Enviar email recordatorio
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: vinnpal7@gmail.com
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.msg.outputs.subject }}
          to: vinnpal7@gmail.com
          from: Redentor Redes <vinnpal7@gmail.com>
          body: ${{ steps.msg.outputs.body }}
          content_type: text/plain
